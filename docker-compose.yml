# version: "3.9"

services:
  app:
    build: .
    container_name: aranya-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      MONGO_URL: mongodb://mongo:27017/aranya
      REDIS_URL: redis://redis:6379
    depends_on:
      - mongo
      - redis
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: aranya-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: aranya-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data:
